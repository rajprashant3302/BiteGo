services:
  # ----------------- NGINX -----------------
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      user-web:
        condition: service_started
      admin-web:
        condition: service_started
      vendor-web:
        condition: service_started
      driver-web:
        condition: service_started
      order-service:
        condition: service_started
      search-service:
        condition: service_started
    restart: always
    networks:
      - bitego_network

  # ----------------- FRONTENDS -----------------
  user-web:
    build:
      context: ./apps/user
      args:
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  vendor-web:
    build: ./apps/vendor
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  driver-web:
    build: ./apps/driver
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  admin-web:
    build: ./apps/admin
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  # ----------------- BACKEND -----------------
  graphql-gateway:
    build: 
      context: .
      dockerfile: backend/graphql-gateway/Dockerfile
    expose:
      - "4000"
    env_file: .env
    depends_on:
      - auth-service
      - order-service
    networks:
      - bitego_network

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - bitego_network

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy # 🔥 ADD THIS
    networks:
      - bitego_network

  payment-service:
    build:
      context: .
      dockerfile: backend/payment-service/Dockerfile
    env_file: .env
    ports:
      - "5005:5005"
    depends_on:
      - db
      - redis
    networks:
      - bitego_network

  earning-service:
    build:
      context: .
      dockerfile: backend/earning-service/Dockerfile
    env_file: .env
    depends_on:
      - db
    networks:
      - bitego_network

  mailer-service:
    build:
      context: .
      dockerfile: backend/mailer-service/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/mailer-service.healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bitego_network

  chat-service:
    build:
      context: .
      dockerfile: backend/chat-service/Dockerfile
    env_file: .env
    ports:
      - "5003:5003"
    depends_on:
      - mongo
      - db
    networks:
      - bitego_network

  ai-ml-service:
      build:
        context: .
        dockerfile: backend/ai-ml-service/Dockerfile
      container_name: bitego-ai-ml-service
      restart: unless-stopped
      ports:
        - "8000:8000"
      environment:
        - AI_ML_EVENTS_INDEX=user_events
        - ES_HOST=http://elasticsearch:9200
        - REDIS_URL=redis://redis:6379
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      env_file:
        - .env
      depends_on:
        db:
          condition: service_started
        redis:
          condition: service_started
        elasticsearch:
          condition: service_healthy
        kafka:
          condition: service_healthy
      healthcheck:
        test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
        interval: 20s
        timeout: 10s
        retries: 5
        start_period: 40s
      networks:
        - bitego_network

  # ----------------- SEARCH & ELASTIC -----------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: bitego_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes: # <--- This must be at the same level as 'ports'
      - ./docker-data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      db:
        condition: service_started
    networks:
      - bitego_network

  search-service:
    build: 
      context: .
      dockerfile: ./backend/search-service/Dockerfile
    container_name: bitego_search
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bitego_network

  delivery-service:
    build:
      context: . 
      dockerfile: backend/delivery-service/Dockerfile
    env_file: .env
    ports:
      - "5004:5004"
    depends_on:
      - db
      - redis
    networks:
      - bitego_network
    
  # ----------------- DATABASE -----------------
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./docker-data/db:/var/lib/postgresql/data
    networks:
      - bitego_network

  redis:
    image: redis:7
    networks:
      - bitego_network

  mongo:
    image: mongo:6
    networks:
      - bitego_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - bitego_network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bitego_network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        echo "[kafka-init] creating required topics..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-success --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-initiated --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-confirmed --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-assigned --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-status-changed --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic driver-location-updates --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic auth-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send-invite-email --partitions 1 --replication-factor 1
        echo "[kafka-init] topic bootstrap complete."
    restart: "no"
    networks:
      - bitego_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - bitego_network

networks:
  bitego_network:
    driver: bridge

volumes:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
