services:
  # ----------------- NGINX -----------------
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-web
      - admin-web
      - vendor-web
      - driver-web
    networks:
      - bitego_network

  # ----------------- FRONTENDS -----------------
  user-web:
    build: ./apps/user
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  vendor-web:
    build: ./apps/vendor
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  driver-web:
    build: ./apps/driver
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  admin-web:
    build: ./apps/admin
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - bitego_network

  # ----------------- BACKEND -----------------
  graphql-gateway:
    build: 
      context: .
      dockerfile: backend/graphql-gateway/Dockerfile
    expose:
      - "4000"
    env_file: .env
    depends_on:
      - auth-service
      - order-service
    networks:
      - bitego_network

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - bitego_network

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      - db
      - redis
    networks:
      - bitego_network

  earning-service:
    build:
      context: .
      dockerfile: backend/earning-service/Dockerfile
    env_file: .env
    depends_on:
      - db
    networks:
      - bitego_network

  mailer-service:
    build:
      context: .
      dockerfile: backend/mailer-service/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - bitego_network

  chat-service:
    build:
      context: .
      dockerfile: backend/chat-service/Dockerfile
    env_file: .env
    depends_on:
      - mongo
    networks:
      - bitego_network

  ai-ml-service:
    build:
      context: ./backend/ai-ml-service
      dockerfile: Dockerfile
    container_name: bitego-ai-ml-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - bitego_network

  # ----------------- SEARCH & ELASTIC -----------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: bitego_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes: # <--- This must be at the same level as 'ports'
      - ./docker-data/elasticsearch:/usr/share/elasticsearch/data
    depends_on:
      db:
        condition: service_started
    networks:
      - bitego_network

  search-service:
    build: 
      context: .
      dockerfile: ./backend/search-service/Dockerfile
    container_name: bitego_search
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - bitego_network

  # ----------------- DATABASE & INFRA -----------------
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./docker-data/db:/var/lib/postgresql/data
    networks:
      - bitego_network

  redis:
    image: redis:7
    networks:
      - bitego_network

  mongo:
    image: mongo:6
    networks:
      - bitego_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bitego_network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bitego_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - bitego_network

networks:
  bitego_network:
    driver: bridge