events {
    worker_connections 1024;
}

http {
    log_format gateway_logs 'Client: $remote_addr | '
                            'Request: "$request" | '
                            'Status: $status | '
                            'Routed To Upstream: $upstream_addr | '
                            'Upstream Response Time: $upstream_response_time sec';

    access_log /dev/stdout gateway_logs;
  server {
    listen 80;
    server_name localhost;

    # Root User App (No basePath needed here usually)
    location / {
      proxy_pass http://user-web:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Admin App
    location /admin {
      proxy_pass http://admin-web:3000; # Removed the trailing slash
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Vendor App
    location /vendor {
      proxy_pass http://vendor-web:3000; # Removed the trailing slash
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Driver App
    location /driver {
      proxy_pass http://driver-web:3000; # Removed the trailing slash
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }


# ==========================================
    # BACKEND API GATEWAY ROUTES
    # ==========================================

    # GraphQL Gateway
    location /svc/graphql {
      rewrite ^/svc/graphql(.*) /graphql$1 break;
      proxy_pass http://graphql-gateway:4000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth Service
    location /svc/auth/ {
      # Translates /svc/auth/api/auth/... -> /api/auth/...
      rewrite ^/svc/auth/(.*) /$1 break; 
      proxy_pass http://auth-service:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Order Service
    location /svc/order/ {
      # Translates /svc/order/api/restaurants -> /api/restaurants
      rewrite ^/svc/order/(.*) /$1 break;
      proxy_pass http://order-service:5001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Chat Service
    location /svc/chat/ {
      rewrite ^/svc/chat/(.*) /$1 break;
      proxy_pass http://chat-service:5003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Delivery Service
    location /svc/delivery/ {
      rewrite ^/svc/delivery/(.*) /$1 break;
      proxy_pass http://delivery-service:5004;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Payment Service
    location /svc/payment/ {
      rewrite ^/svc/payment/(.*) /$1 break;
      proxy_pass http://payment-service:5005;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Search Service
    location /svc/search/ {
      rewrite ^/svc/search/(.*) /$1 break;
      proxy_pass http://search-service:8001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # AI/ML Service
    location /svc/ai/ {
      rewrite ^/svc/ai/(.*) /$1 break;
      proxy_pass http://ai-ml-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    # promotion-service
    location /svc/promotion/ {
      # Translates /svc/promotion/api/admin/... -> /api/admin/...
      rewrite ^/svc/promotion/(.*) /$1 break;
      proxy_pass http://promotion-service:5006;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
