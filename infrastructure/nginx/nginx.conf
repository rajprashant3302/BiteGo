worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include       mime.types;
    default_type  application/octet-stream;

    # ----------------- FRONTEND UPSTREAMS -----------------
    upstream user-web {
        server user-web:3000;
    }
    upstream vendor-web {
        server vendor-web:3000;
    }
    upstream driver-web {
        server driver-web:3000;
    }
    upstream admin-web {
        server admin-web:3000;
    }

    # ----------------- SERVER CONFIG -----------------
    server {
        listen 80;

        # User frontend
        location /user/ {
            proxy_pass http://user-web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Vendor frontend
        location /vendor/ {
            proxy_pass http://vendor-web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Driver frontend
        location /driver/ {
            proxy_pass http://driver-web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin frontend
        location /admin/ {
            proxy_pass http://admin-web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Optional: default location
        location / {
            return 301 /user/;
        }
    }
}
